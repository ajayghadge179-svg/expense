<!DOCTYPE html>
<html>
<head>

<title>Yearly Expense Chart</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

.container{
width:70%;
height: 1000px;
margin:auto;
margin-top:40px;
background:rgb(205, 196, 196);
padding:20px;
border-radius:10px;
}

.chart-container{
width:500px;
height:500px;
margin:auto;
margin-top: 40px;
}


button{
padding:10px 20px;
border:none;
background:#202123;
color:white;
border-radius:5px;
cursor:pointer;
margin-bottom:20px;
margin top: 20px;

}
button:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>Yearly Expense Chart</h1>

<button onclick="goBack()">⬅ Back</button>

<div class="chart-container">
<canvas id="yearlyChart"></canvas>
</div>

</div>

<script>

function goBack(){
window.location.href="index.html";
}

fetch("http://localhost:3000/expenses")
.then(res=>res.json())
.then(data=>{

const year = new Date().getFullYear();

const yearlyData = data.filter(e=>{

const d=new Date(e.date);

return d.getFullYear()===year;

});

let map={};

yearlyData.forEach(e=>{

if(map[e.title]){
map[e.title]+=Number(e.amount);
}else{
map[e.title]=Number(e.amount);
}

});

const labels=Object.keys(map);
const values=Object.values(map);

const ctx=document.getElementById("yearlyChart");

new Chart(ctx,{
type:"pie",
data:{
labels:labels,
datasets:[{data:values}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

});

</script>

</body>
</html>
